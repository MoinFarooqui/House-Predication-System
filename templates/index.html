<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>House Price Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>House Price Prediction</h1>    
        <form action="/predict" method="post">

            <!-- Living Area -->
            <label>Living Area (in square feet):</label>
            <input type="number" name="GrLivArea" step="0.01" required><br>

            <!-- House Quality -->
            <label>Overall House Quality (1 = Poor, 10 = Excellent):</label>
            <input type="number" name="OverallQual" min="1" max="10" required><br>

            <!-- Construction Year -->
            <label>Year Built:</label>
            <input type="number" name="YearBuilt" required><br>

            <!-- Basement Area -->
            <label>Basement Size (in square feet):</label>
            <input type="number" name="TotalBsmtSF" step="0.01" required><br>

            <!-- Bathrooms -->
            <label>Number of Bathrooms:</label>
            <input type="number" name="FullBath" required><br>

            <!-- Rooms -->
            <label>Total Rooms (above ground):</label>
            <input type="number" name="TotRmsAbvGrd" required><br>

            <button type="submit">Predict Price</button>
        </form>

        {% if prediction_text %}
            <h2>{{ prediction_text }}</h2>
        {% endif %}
    </div>
</body>
</html>
